<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>汩汩的午夜后宫</title>

<style>
/* ============================================================
           全局重置（你以前的样式，完全保留）
           ============================================================ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    background: #000;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

/* ============================================================
           启动屏（视频）
           ============================================================ */
#splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1000;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    cursor: pointer;
    transition: opacity 0.9s ease;
}

#splash-screen.hidden {
    opacity: 0;
    pointer-events: none;
}

#splash-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
}

#sound-tip {
    position: absolute;
    bottom: 20%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    color: rgba(255, 255, 255, 0.6);
    font-size: 14px;
    letter-spacing: 4px;
    background: rgba(0, 0, 0, 0.3);
    padding: 10px 28px;
    border-radius: 40px;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    pointer-events: none;
    transition: opacity 0.8s ease;
}

#sound-tip.hidden {
    opacity: 0;
}

/* ============================================================
           主屏幕（完全还原你以前的样式）
           ============================================================ */
#main-menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 900;
    background-image: url("image/beijin.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    opacity: 0;
    visibility: hidden;
    transition: opacity 1.2s ease 0.3s, visibility 1.2s ease 0.3s;
    padding: 30px;
    text-align: center;
    background-color: #0b0e14;
}

#main-menu.show {
    opacity: 1;
    visibility: visible;
}

#main-menu::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 14, 26, 0.45);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 0;
}

.menu-content {
    position: relative;
    z-index: 1;
    max-width: 520px;
    width: 100%;
    padding: 20px;
}

.game-title {
    font-size: 42px;
    font-weight: 700;
    color: #ff3333;
    text-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    letter-spacing: 8px;
    margin-bottom: 6px;
}

.game-subtitle {
    font-size: 18px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.75);
    letter-spacing: 6px;
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    padding-top: 14px;
    margin-bottom: 44px;
}

.menu-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
}

.menu-btn {
    padding: 14px 32px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 60px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: rgba(255, 255, 255, 0.8);
    font-size: 18px;
    font-weight: 600;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    transition: all 0.4s ease;
    letter-spacing: 4px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    min-width: 140px;
    text-align: center;
    flex: 1;
    max-width: 200px;
}

.menu-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.4);
    transform: scale(1.03);
}

/* ============================================================
           底部 UI
           ============================================================ */
#bottom-ui {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 901;
    color: rgba(255, 255, 255, 0.15);
    font-size: 12px;
    letter-spacing: 3px;
    pointer-events: none;
}

#mute-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 901;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5);
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- ============================================================
        启动屏（视频）
        ============================================================ -->
<div id="splash-screen">
    <video
        id="splash-video"
        src="video/splash.mp4"
        playsinline
        autoplay
        preload="auto"
        muted>
    </video>
    <div id="sound-tip">🔊 点击画面开启声音</div>
</div>

<!-- ============================================================
        主屏幕（开始游戏 / 选择夜晚 已融合）
        ============================================================ -->
<div id="main-menu">
    <div class="menu-content">
        <div class="game-title">汩汩的午夜后宫</div>
        <div class="game-subtitle">午夜 · 守护 · 疯鸟</div>

        <div class="menu-buttons">
            <!-- ✅ 融合后的核心入口 -->
            <button class="menu-btn" onclick="enterNight()">
                开始守夜
            </button>

            <button class="menu-btn" onclick="selectRole()">
                角色选择
            </button>

            <button class="menu-btn" onclick="exitGame()">
                退出游戏
            </button>
        </div>
    </div>
</div>

<div id="bottom-ui">✦ 午夜之后，谁还能醒来 ✦</div>
<button id="mute-btn">🔊</button>

<script>
/* ============================================================
       音频系统（100% 照搬《云端之上》）
       ============================================================ */
let bgm = null;
let soundEnabled = false;

function initBGM() {
    try {
        bgm = new Audio('music/yinyue.mp3');
        bgm.loop = true;
        bgm.volume = 0.5;
    } catch (e) {
        console.warn('主菜单音乐初始化失败:', e);
    }
}

function playBGM() {
    if (!bgm) initBGM();
    try {
        if (bgm && bgm.paused) {
            bgm.currentTime = 0;
            bgm.play().catch(() => {});
        }
    } catch (e) {
        console.warn('主菜单音乐播放失败:', e);
    }
}

function stopBGM() {
    try {
        if (bgm && !bgm.paused) {
            bgm.pause();
            bgm.currentTime = 0;
        }
    } catch (e) {}
}

/* ============================================================
       DOM
       ============================================================ */
const splashScreen = document.getElementById('splash-screen');
const splashVideo = document.getElementById('splash-video');
const soundTip = document.getElementById('sound-tip');
const mainMenu = document.getElementById('main-menu');
const muteBtn = document.getElementById('mute-btn');

/* ============================================================
       点击画面：开启声音
       ============================================================ */
splashScreen.addEventListener('click', function () {
    if (!soundEnabled) {
        splashVideo.muted = false;
        soundEnabled = true;
        soundTip.classList.add('hidden');
        splashVideo.play().catch(() => {});
    }
});

/* ============================================================
       视频结束 → 进入主菜单 + 播放 BGM
       ============================================================ */
splashVideo.addEventListener('ended', function () {
    splashScreen.classList.add('hidden');
    splashVideo.pause();

    setTimeout(function () {
        mainMenu.classList.add('show');
        playBGM();
    }, 600);
});

/* ============================================================
       静音控制
       ============================================================ */
muteBtn.addEventListener('click', function () {
    if (bgm) {
        bgm.muted = !bgm.muted;
        splashVideo.muted = !splashVideo.muted;
        muteBtn.textContent = bgm.muted ? '🔊' : '🔇';
    }
});

/* ============================================================
       融合后的入口：开始守夜（= 开始游戏 + 选择夜晚）
       ============================================================ */
function enterNight() {
    stopBGM();
    location.href = 'night.html'; // ✅ 夜晚选择页
}

function selectRole() {
    location.href = 'character.html';
}

function exitGame() {
    if (confirm('确定要退出吗？')) {
        window.close();
    }
}

/* ============================================================
       初始化
       ============================================================ */
initBGM();
</script>

</body>
</html>
