<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>选择夜晚 · 汩汩的午夜后宫</title>

<style>
/* ================= 全局 ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Courier New', monospace;
    color: #fff;
}

/* ================= 背景 ================= */
#bg {
    position: fixed;
    inset: 0;
    background: url('image/beijin.png') center/cover no-repeat;
    filter: brightness(0.35) blur(2px);
    z-index: -1;
}

/* ================= 主容器 ================= */
#container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 24px;
}

/* ================= 标题 ================= */
.title {
    font-size: clamp(28px, 6vw, 48px);
    color: #ff3333;
    text-shadow: 0 0 20px rgba(255,51,51,0.6);
    letter-spacing: 6px;
    text-align: center;
}

.subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 4px;
    margin-top: -10px;
    text-align: center;
}

/* ================= 夜晚选择区 ================= */
.nights {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    max-width: 520px;
    width: 100%;
}

.night-card {
    width: 100px;
    height: 100px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    user-select: none;
}

.night-card:hover {
    background: rgba(255,51,51,0.25);
    border-color: rgba(255,51,51,0.6);
    transform: scale(1.05);
}

.night-card.selected {
    background: rgba(255,51,51,0.35);
    border-color: #ff3333;
    box-shadow: 0 0 18px rgba(255,51,51,0.45);
}

.night-num {
    font-size: 22px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 2px;
}

.night-name {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
    text-align: center;
    line-height: 1.2;
}

/* ================= 自定义夜晚 ================= */
.custom-night {
    width: 100%;
    max-width: 520px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.custom-title {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    letter-spacing: 2px;
    text-align: center;
}

.sliders {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.slider-label {
    width: 80px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
}

.slider-value {
    width: 30px;
    font-size: 12px;
    color: #ff3333;
    text-align: right;
}

input[type="range"] {
    flex: 1;
    accent-color: #ff3333;
}

/* ================= 按钮区 ================= */
.buttons {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
}

.btn {
    padding: 12px 28px;
    font-size: 15px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 40px;
    background: rgba(255,255,255,0.06);
    color: #fff;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.3s;
}

.btn:hover {
    background: rgba(255,51,51,0.3);
    border-color: #ff3333;
}

.btn.confirm {
    background: rgba(255,51,51,0.25);
    border-color: #ff3333;
}

.btn.back {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
}

/* ================= 底部 ================= */
.bottom {
    position: fixed;
    bottom: 18px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 3px;
    pointer-events: none;
}

/* ================= 角色提示 ================= */
.role-hint {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    margin-top: -6px;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="container">
    <div class="title">选择守夜</div>
    <div class="subtitle">午夜 · 守护 · 疯鸟</div>
    <div class="role-hint" id="roleHint"></div>

    <!-- 夜晚选择 -->
    <div class="nights" id="nights"></div>

    <!-- 自定义夜晚 -->
    <div class="custom-night" id="customNight">
        <div class="custom-title">自定义夜晚 · 难度调节</div>
        <div class="sliders">
            <div class="slider-row">
                <div class="slider-label">汩汩</div>
                <input type="range" id="s-gugu" min="0" max="20" value="10">
                <div class="slider-value" id="v-gugu">10</div>
            </div>
            <div class="slider-row">
                <div class="slider-label">皮皮</div>
                <input type="range" id="s-pipi" min="0" max="20" value="8">
                <div class="slider-value" id="v-pipi">8</div>
            </div>
            <div class="slider-row">
                <div class="slider-label">葡萄</div>
                <input type="range" id="s-pt" min="0" max="20" value="6">
                <div class="slider-value" id="v-pt">6</div>
            </div>
            <div class="slider-row">
                <div class="slider-label">劳力士</div>
                <input type="range" id="s-rolex" min="0" max="20" value="12">
                <div class="slider-value" id="v-rolex">12</div>
            </div>
        </div>
    </div>

    <!-- 按钮 -->
    <div class="buttons">
        <button class="btn confirm" id="confirmBtn">确认守夜</button>
        <button class="btn back" onclick="location.href='index.html'">返回主菜单</button>
    </div>
</div>

<div class="bottom">✦ 午夜之后，谁还能醒来 ✦</div>

<script>
/* ================= 解析角色参数 ================= */
const params = new URLSearchParams(window.location.search);
const role = params.get('role') || 'wen'; // wen / kaixin
const roleName = role === 'kaixin' ? '开心' : '文';

document.getElementById('roleHint').textContent =
    '当前角色：' + roleName + '（' + (role === 'kaixin' ? '蛋黄护体可用' : '常规守夜') + '）';

/* ================= 夜晚配置 ================= */
const nights = [
    { id: 1, name: '第一夜', desc: '初入后宫\n仅有汩汩与劳力士' },
    { id: 2, name: '第二夜', desc: '皮皮攀爬\n葡萄干扰监控' },
    { id: 3, name: '第三夜', desc: '蛋白与小斑\n豆豆潜入' },
    { id: 4, name: '第四夜', desc: '全员出动\n极度危险' },
    { id: 5, name: '第五夜', desc: '最终考验\n极限守夜' },
    { id: 6, name: '自定义', desc: '自由调节\n敌人强度' }
];

let selectedNight = 1;

/* ================= 渲染夜晚卡片 ================= */
const nightsEl = document.getElementById('nights');

nights.forEach(n => {
    const card = document.createElement('div');
    card.className = 'night-card' + (n.id === 1 ? ' selected' : '');
    card.dataset.id = n.id;

    card.innerHTML = `
        <div class="night-num">NIGHT ${n.id}</div>
        <div class="night-name">${n.name}<br>${n.desc.replace(/\n/g,'<br>')}</div>
    `;

    card.onclick = () => {
        document.querySelectorAll('.night-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedNight = n.id;

        document.getElementById('customNight').style.display =
            n.id === 6 ? 'flex' : 'none';
    };

    nightsEl.appendChild(card);
});

/* ================= 自定义夜晚滑块 ================= */
['gugu','pipi','pt','rolex'].forEach(id => {
    const slider = document.getElementById('s-' + id);
    const value  = document.getElementById('v-' + id);
    slider.oninput = () => value.textContent = slider.value;
});

/* ================= 确认守夜 ================= */
document.getElementById('confirmBtn').onclick = () => {
    let url = '';

    if (selectedNight <= 5) {
        // ✅ 关键修复：Night 2 指向 game2*.html
        url = 'game' + selectedNight + role + '.html?night=' + selectedNight;
    } else {
        // 自定义夜晚（Night 6）
        const diff = {
            gugu:   document.getElementById('s-gugu').value,
            pipi:   document.getElementById('s-pipi').value,
            pt:     document.getElementById('s-pt').value,
            rolex:  document.getElementById('s-rolex').value
        };
        url = 'game6' + role + '.html?night=6&diff=' + encodeURIComponent(JSON.stringify(diff));
    }

    location.href = url;
};

/* ================= 初始化 ================= */
document.getElementById('customNight').style.display = 'none';
</script>

</body>
</html>
